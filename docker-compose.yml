services:
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bun_dev_intel}
      POSTGRES_USER: ${POSTGRES_USER:-bun_dev_intel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your local env file}
    volumes:
      - remote-docs-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-bun_dev_intel} -d $${POSTGRES_DB:-bun_dev_intel}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp-http-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "bun run db:migrate && exec bun apps/mcp-http/src/index.ts"]
    restart: unless-stopped
    environment:
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:?set MCP_BEARER_TOKEN in your local env file}
      DATABASE_URL: postgres://${POSTGRES_USER:-bun_dev_intel}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres-pgvector:5432/${POSTGRES_DB:-bun_dev_intel}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your local env file}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
      DOCS_REFRESH_INTERVAL: ${DOCS_REFRESH_INTERVAL:-7d}
      DOCS_REFRESH_RUNNING_TIMEOUT_SECONDS: ${DOCS_REFRESH_RUNNING_TIMEOUT_SECONDS:-1800}
      DOCS_REFRESH_MAX_PAGES_PER_RUN: ${DOCS_REFRESH_MAX_PAGES_PER_RUN:-500}
      DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN: ${DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN:-2000}
      DOCS_REFRESH_MAX_CONCURRENCY: ${DOCS_REFRESH_MAX_CONCURRENCY:-4}
      DOCS_SEARCH_DEFAULT_LIMIT: ${DOCS_SEARCH_DEFAULT_LIMIT:-5}
      DOCS_SEARCH_MAX_LIMIT: ${DOCS_SEARCH_MAX_LIMIT:-20}
      DOCS_ALLOWED_ORIGINS: ${DOCS_ALLOWED_ORIGINS:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres-pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://127.0.0.1:3000/healthz'); process.exit(r.ok ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 5

  docs-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c 'set -e;
      while true; do
        bun apps/docs-worker/src/index.ts;
        sleep "$${DOCS_WORKER_POLL_SECONDS:-300}";
      done'
    restart: unless-stopped
    environment:
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-3000}
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:?set MCP_BEARER_TOKEN in your local env file}
      DATABASE_URL: postgres://${POSTGRES_USER:-bun_dev_intel}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres-pgvector:5432/${POSTGRES_DB:-bun_dev_intel}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your local env file}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
      DOCS_REFRESH_INTERVAL: ${DOCS_REFRESH_INTERVAL:-7d}
      DOCS_REFRESH_RUNNING_TIMEOUT_SECONDS: ${DOCS_REFRESH_RUNNING_TIMEOUT_SECONDS:-1800}
      DOCS_REFRESH_MAX_PAGES_PER_RUN: ${DOCS_REFRESH_MAX_PAGES_PER_RUN:-500}
      DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN: ${DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN:-2000}
      DOCS_REFRESH_MAX_CONCURRENCY: ${DOCS_REFRESH_MAX_CONCURRENCY:-4}
      DOCS_SEARCH_DEFAULT_LIMIT: ${DOCS_SEARCH_DEFAULT_LIMIT:-5}
      DOCS_SEARCH_MAX_LIMIT: ${DOCS_SEARCH_MAX_LIMIT:-20}
      DOCS_ALLOWED_ORIGINS: ${DOCS_ALLOWED_ORIGINS:-}
    depends_on:
      postgres-pgvector:
        condition: service_healthy
      mcp-http-server:
        condition: service_healthy

  admin-console:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun apps/admin-console/server/src/index.ts
    restart: unless-stopped
    environment:
      ADMIN_HTTP_HOST: 0.0.0.0
      ADMIN_HTTP_PORT: 3100
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-604800}
      ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${ADMIN_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}
      ADMIN_LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${ADMIN_LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-10}
      ADMIN_AUTH_LOG_LEVEL: ${ADMIN_AUTH_LOG_LEVEL:-INFO}
      ADMIN_STATIC_ASSETS_DIR: apps/admin-console/client/dist
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      DATABASE_URL: postgres://${POSTGRES_USER:-bun_dev_intel}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres-pgvector:5432/${POSTGRES_DB:-bun_dev_intel}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your local env file}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-}
      DOCS_REFRESH_MAX_PAGES_PER_RUN: ${DOCS_REFRESH_MAX_PAGES_PER_RUN:-500}
      DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN: ${DOCS_REFRESH_MAX_EMBEDDINGS_PER_RUN:-2000}
      DOCS_SEARCH_DEFAULT_LIMIT: ${DOCS_SEARCH_DEFAULT_LIMIT:-5}
      DOCS_SEARCH_MAX_LIMIT: ${DOCS_SEARCH_MAX_LIMIT:-20}
    ports:
      - "3100:3100"
    depends_on:
      postgres-pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://127.0.0.1:3100/healthz'); process.exit(r.ok ? 0 : 1);"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  remote-docs-postgres:
